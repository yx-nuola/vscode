<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitmapEngine Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        .canvas-container {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .info h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .info ul {
            margin-left: 20px;
            color: #666;
        }
        .info li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BitmapEngine 组件预览</h1>
        <div class="canvas-container" id="bitmap-container">
            <!-- BitmapEngine will be mounted here -->
        </div>
        <div class="info">
            <h3>当前功能：</h3>
            <ul>
                <li>X轴（顶部）：显示0, 4, 8...刻度，带刻度线</li>
                <li>Y轴（左侧）：显示0, 4, 8...刻度，带刻度线</li>
                <li>左上角标签：Y\X</li>
                <li>工具栏：放大(+)、缩小(-)、还原(⟲)、模式切换</li>
                <li>平移模式：拖动Canvas移动视口</li>
                <li>滚动优化：对象池复用 + RAF节流</li>
            </ul>
        </div>
    </div>

    <script>
        // Display info about the component
        document.getElementById('bitmap-container').innerHTML = `
            <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 18px;">
                <div style="text-align: center;">
                    <div style="margin-bottom: 20px; font-size: 48px;">🎨</div>
                    <div>BitmapEngine 组件预览</div>
                    <div style="font-size: 14px; margin-top: 10px; color: #666;">
                        请使用 VS Code 调试模式查看实际效果
                    </div>
                    <div style="font-size: 12px; margin-top: 20px; color: #999;">
                        按 F5 启动 Extension Development Host<br>
                        或运行 "npm run watch" 编译后在 VS Code 中测试
                    </div>
                </div>
            </div>
        `;
    </script>
</body>
</html>
